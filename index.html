<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARUNG ALFEEN - Digital POS & PPOB</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        @keyframes scanner-line { 0% { top: 10%; opacity: 0; } 50% { opacity: 1; } 100% { top: 90%; opacity: 0; } }
        .animate-scanner-line { position: absolute; left: 5%; width: 90%; height: 2px; background: #4F46E5; box-shadow: 0 0 15px #4F46E5; animation: scanner-line 2s infinite ease-in-out; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #reader video, #reader-modal video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #reader__dashboard_section_swaplink, #reader-modal__dashboard_section_swaplink { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const SUPABASE_URL = "https://xhfhmtunsbechgnzgkur.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-P2eIz6XnQ2a4xt4-3ANMQ_7nxWHYfD";
        const APP_NAME = "WARUNG ALFEEN";
        const APP_ADDRESS = "Kp. Cikabodas - Tamanjaya";
        const CURRENCY = "Rp";
        const ADMIN_FEE = 3000;
        const TOKEN_DENOMS = [20000, 50000, 100000, 200000, 500000];

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [activeTab, setActiveTab] = useState('cashier');
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isScanningModal, setIsScanningModal] = useState(false);
            const [isFlashOn, setIsFlashOn] = useState(false);
            const [notification, setNotification] = useState(null);
            const [cashReceived, setCashReceived] = useState('');
            const [discount, setDiscount] = useState('');
            const [lastReceipt, setLastReceipt] = useState(null);
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);

            const scannerRef = useRef(null);
            const modalScannerRef = useRef(null);
            const receiptRef = useRef(null);

            const fetchData = async () => {
                try {
                    const { data: p } = await supabase.from('products').select('*').order('name');
                    const { data: s } = await supabase.from('sales').select('*').order('timestamp', { ascending: false });
                    if (p) setInventory(p);
                    if (s) setSales(s || []);
                } catch (e) { console.error("Sync Error", e); }
            };

            useEffect(() => { 
                fetchData(); 
                if(window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            }, [activeTab, inventory, isScanning, isScanningModal, lastReceipt, isModalOpen]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const subtotal = useMemo(() => cart.reduce((s, i) => s + (i.price * i.quantity), 0), [cart]);
            const cartTotal = useMemo(() => Math.max(0, subtotal - (Number(discount) || 0)), [subtotal, discount]);
            const changeAmount = cashReceived ? Number(cashReceived) - cartTotal : 0;

            const stats = useMemo(() => {
                if (!sales || !Array.isArray(sales)) return { 
                    totalRevenue: 0, totalProfit: 0, 
                    todayRevenue: 0, todayProfit: 0,
                    totalTransactions: 0 
                };
                
                const today = new Date().toLocaleDateString('en-CA'); // Format YYYY-MM-DD
                
                let totalRevenue = 0;
                let totalProfit = 0;
                let todayRevenue = 0;
                let todayProfit = 0;

                sales.forEach(s => {
                    const amount = Number(s.total) || 0;
                    const profit = Number(s.profit) || 0;
                    const saleDate = new Date(s.timestamp).toLocaleDateString('en-CA');

                    totalRevenue += amount;
                    totalProfit += profit;

                    if (saleDate === today) {
                        todayRevenue += amount;
                        todayProfit += profit;
                    }
                });

                return { totalRevenue, totalProfit, todayRevenue, todayProfit, totalTransactions: sales.length };
            }, [sales]);

            const updateCartQty = (idx, delta) => {
                const newCart = [...cart];
                const item = newCart[idx];
                const newQty = item.quantity + delta;

                if (newQty <= 0) {
                    // Hapus jika jumlah jadi 0
                    newCart.splice(idx, 1);
                } else {
                    // Validasi stok jika bukan PPOB
                    if (item.type !== 'ppob') {
                        const product = inventory.find(p => p.id === item.id);
                        if (product && newQty > product.stock) {
                            return notify("Batas stok tercapai!", "error");
                        }
                    }
                    newCart[idx].quantity = newQty;
                }
                setCart(newCart);
            };

            const addToCart = (p) => {
                if (p.type !== 'ppob' && p.stock <= 0) return notify("Stok habis!", "error");
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id && item.meterId === p.meterId);
                    if (exists && p.type !== 'ppob') {
                        return prev.map(item => item.id === p.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...p, quantity: 1 }];
                });
                notify(`${p.name} ditambah`);
            };

            const checkout = async () => {
                if (cart.length === 0 || !cashReceived || changeAmount < 0) {
                    return notify("Lengkapi pembayaran!", "error");
                }

                try {
                    notify("Proses simpan cloud...", "success");

                    const totalMargin = cart.reduce((sum, item) => {
                        const margin = item.type === 'ppob' ? ADMIN_FEE : (item.price - (item.cost_price || 0));
                        return sum + (margin * item.quantity);
                    }, 0);
                    
                    const finalProfit = totalMargin - (Number(discount) || 0);

                    const saleData = {
                        id: `TRX-${Date.now()}`,
                        items: cart,
                        total: Number(cartTotal),
                        profit: Number(finalProfit),
                        discount: Number(discount) || 0,
                        subtotal: Number(subtotal),
                        payment: Number(cashReceived),
                        change_amount: Number(changeAmount),
                        timestamp: new Date().toISOString()
                    };

                    const { error } = await supabase.from('sales').insert([saleData]);
                    if (error) throw new Error(error.message);

                    for (const item of cart) {
                        if (item.type !== 'ppob') {
                            await supabase.from('products').update({ stock: item.stock - item.quantity }).eq('id', item.id);
                        }
                    }

                    setLastReceipt(saleData);
                    setCart([]); setCashReceived(''); setDiscount(''); 
                    fetchData();
                    notify("Berhasil Tersimpan!");

                } catch (err) {
                    notify("Gagal: " + err.message, "error");
                }
            };

            const startScanner = async (target = "reader") => {
                const isMain = target === "reader";
                isMain ? setIsScanning(true) : setIsScanningModal(true);
                setTimeout(async () => {
                    const html5QrCode = new window.Html5Qrcode(target);
                    isMain ? scannerRef.current = html5QrCode : modalScannerRef.current = html5QrCode;
                    try {
                        await html5QrCode.start({ facingMode: "environment" }, {
                            fps: 30, qrbox: (w, h) => ({ width: w * 0.8, height: w * 0.4 })
                        }, (decodedText) => {
                            if(navigator.vibrate) navigator.vibrate(80);
                            if(isMain) {
                                const p = inventory.find(i => i.barcode === decodedText);
                                if (p) { addToCart(p); stopScanner("reader"); }
                                else notify("Barang tidak ada", "error");
                            } else {
                                const input = document.getElementById('product_barcode');
                                if(input) input.value = decodedText;
                                stopScanner("reader-modal");
                            }
                        });
                    } catch (err) { isMain ? setIsScanning(false) : setIsScanningModal(false); }
                }, 400);
            };

            const stopScanner = async (target = "reader") => {
                const isMain = target === "reader";
                const ref = isMain ? scannerRef : modalScannerRef;
                if (ref.current) {
                    try { await ref.current.stop(); ref.current = null; } catch (e) {}
                }
                isMain ? setIsScanning(false) : setIsScanningModal(false);
                setIsFlashOn(false);
            };

            const toggleFlash = async (target = "reader") => {
                const isMain = target === "reader";
                const ref = isMain ? scannerRef : modalScannerRef;
                if (ref.current && ref.current.isScanning) {
                    try {
                        const nextState = !isFlashOn;
                        await ref.current.applyVideoConstraints({ advanced: [{ torch: nextState }] });
                        setIsFlashOn(nextState);
                    } catch (e) { notify("Flash tidak didukung", "error"); }
                }
            };

            const runAI = async () => {
                setIsAiLoading(true);
                try {
                    const low = inventory.filter(i => i.stock < 10).map(i => i.name).join(", ");
                    const prompt = `Analisis Warung Alfeen: Hari ini Omzet Rp${stats.todayRevenue}, Laba Rp${stats.todayProfit}. Total Omzet Rp${stats.totalRevenue}, Total Laba Rp${stats.totalProfit}. Stok rendah: ${low || 'Aman'}. Berikan ringkasan performa dan 3 saran strategi singkat.`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    setAiAnalysis(data.candidates[0].content.parts[0].text);
                } catch (e) { setAiAnalysis("AI sedang beristirahat."); }
                finally { setIsAiLoading(false); }
            };

            const downloadReceipt = () => {
                if (!receiptRef.current) return;
                notify("Membuat gambar...", "success");
                window.html2canvas(receiptRef.current, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Alfeen_${lastReceipt.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                    notify("Struk Tersimpan!");
                }).catch(err => {
                    notify("Gagal download", "error");
                });
            };

            return (
                <div className="min-h-screen pb-24 lg:pb-0 lg:pl-64 flex flex-col">
                    <aside className="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-slate-900 text-white flex-col p-6 z-50">
                        <div className="mb-10"><h1 className="text-2xl font-black text-indigo-400 italic">WARUNG ALFEEN</h1></div>
                
                        <nav className="space-y-2">
                            <NavBtn id="cashier" icon="layout-dashboard" label="Kasir" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ppob" icon="zap" label="Listrik" active={activeTab} set={setActiveTab} />
                            <NavBtn id="inventory" icon="package" label="Stok" active={activeTab} set={setActiveTab} />
                            <NavBtn id="history" icon="history" label="Rekap" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ai" icon="brain-circuit" label="Asisten AI" active={activeTab} set={setActiveTab} />
                        </nav>
                    </aside>

                    <nav className="lg:hidden fixed bottom-0 left-0 w-full glass-nav z-[100] px-4 py-3 flex justify-around items-center">
                        <MobileNavBtn id="cashier" icon="layout-dashboard" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ppob" icon="zap" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="inventory" icon="package" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="history" icon="history" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ai" icon="brain-circuit" active={activeTab} set={setActiveTab} />
                    </nav>

                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl bg-slate-900 text-white font-bold text-xs flex items-center gap-2 shadow-2xl animate-in slide-in-from-top-4">
                            <div className={`w-2 h-2 rounded-full ${notification.type === 'error' ? 'bg-rose-500' : 'bg-emerald-400'}`}></div>
                            {notification.msg}
                        </div>
                    )}

                    <main className="flex-1 p-4 md:p-8 w-full max-w-7xl mx-auto">
                        {activeTab === 'cashier' && (
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                <div className="xl:col-span-2 space-y-6">
                                    <div className="flex gap-3">
                                        <input type="text" placeholder="Cari..." className="flex-1 p-4 bg-white rounded-2xl border outline-none font-bold" onChange={e => setSearchTerm(e.target.value)} />
                                        <button onClick={() => isScanning ? stopScanner("reader") : startScanner("reader")} className={`px-6 rounded-2xl font-bold ${isScanning ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`}><i data-lucide={isScanning ? "x" : "camera"}></i></button>
                                    </div>
                                    {isScanning && (
                                        <div className="relative aspect-video rounded-3xl overflow-hidden bg-black border-4 border-white shadow-2xl">
                                            <div id="reader" className="w-full h-full"></div>
                                            <div className="animate-scanner-line"></div>
                                            <button onClick={() => toggleFlash("reader")} className="absolute top-4 right-4 z-20 p-4 bg-black/40 backdrop-blur-md text-white rounded-full border border-white/10">
                                                <i data-lucide="zap" className={isFlashOn ? 'text-yellow-400' : ''}></i>
                                            </button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {inventory.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <button key={p.id} onClick={() => addToCart(p)} className="bg-white p-4 rounded-3xl border shadow-sm hover:shadow-xl active:scale-95 text-left flex flex-col h-full group">
                                                <h3 className="font-bold text-sm text-slate-800 flex-1 leading-tight">{p.name}</h3>
                                                <p className="text-lg font-black text-indigo-600 mt-2">{CURRENCY} {p.price.toLocaleString()}</p>
                                                <p className="text-[10px] text-slate-400">Sisa {p.stock}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-[2.5rem] border shadow-2xl flex flex-col h-fit sticky top-8 overflow-hidden">
                                    <div className="p-6 border-b bg-slate-50 font-black text-lg flex justify-between"><h2>KERANJANG</h2><button onClick={()=>setCart([])} className="text-rose-400 text-xs">HAPUS</button></div>
                                    <div className="p-6 space-y-4 max-h-[40vh] overflow-y-auto custom-scrollbar">
                                        {cart.map((it, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-white">
                                                <div className="flex-1 pr-4"><p className="text-xs font-black leading-tight">{it.name}</p>
                                                <div className="flex items-center gap-3 mt-1">
                                                    <button onClick={() => updateCartQty(idx, -1)} className="w-7 h-7 bg-white rounded-lg shadow-sm border">-</button>
                                                    <span className="text-xs font-black">{it.quantity}</span>
                                                    <button onClick={() => updateCartQty(idx, 1)} className="w-7 h-7 bg-white rounded-lg shadow-sm border">+</button>
                                                </div></div>
                                                <p className="font-black text-indigo-600 text-sm">{(it.price * it.quantity).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-8 bg-slate-50 border-t space-y-4">
                                        <div className="flex justify-between px-2 text-[10px] font-black text-slate-400"><span>SUBTOTAL</span><span>{CURRENCY} {subtotal.toLocaleString()}</span></div>
                                        <input type="number" placeholder="Diskon (Rp)..." className="w-full p-3 bg-white rounded-xl font-bold text-rose-500 shadow-inner border border-rose-50" value={discount} onChange={e => setDiscount(e.target.value)} />
                                        <div className="flex justify-between items-end border-t pt-2">
                                            <span className="text-[11px] font-black text-indigo-500">TOTAL</span>
                                            <span className="text-4xl font-black text-slate-900">{CURRENCY} {cartTotal.toLocaleString()}</span>
                                        </div>
                                        <input type="number" placeholder="Bayar Tunai..." className="w-full p-4 bg-white rounded-2xl font-black text-center text-3xl text-indigo-600 shadow-sm border-2 border-transparent focus:border-indigo-100" value={cashReceived} onChange={e => setCashReceived(e.target.value)} />
                                        <div className="flex justify-between px-2"><span className="text-[10px] font-black text-slate-400">Kembalian</span><span className={`text-xl font-black ${changeAmount < 0 ? 'text-rose-500' : 'text-emerald-600'}`}>{CURRENCY} {changeAmount.toLocaleString()}</span></div>
                                        <button onClick={checkout} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black shadow-2xl active:scale-95 transition-all">PROSES BAYAR CLOUD</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ppob' && (
                             <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                                <div className="text-center py-6"><h2 className="text-4xl font-black">Listrik & Token</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6">
                                        <h3 className="font-black uppercase italic text-indigo-600">Token Listrik</h3>
                                        <input id="tkn_meter" type="text" placeholder="No. Meter..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-indigo-700 text-center text-xl" />
                                        <div className="grid grid-cols-3 gap-3">
                                            {TOKEN_DENOMS.map(d => (
                                                <button key={d} onClick={() => {
                                                    const m = document.getElementById('tkn_meter').value;
                                                    if(!m) return notify("Isi No Meter!", "error");
                                                    addToCart({ id: `TKN-${d}`, name: `TOKEN PLN ${d/1000}K`, price: d + ADMIN_FEE, type: 'ppob', meterId: m, quantity: 1 });
                                                }} className="py-4 bg-indigo-50 text-indigo-600 rounded-2xl font-black text-sm">{d/1000}K</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6">
                                        <h3 className="font-black uppercase italic text-emerald-600">Tagihan PLN</h3>
                                        <input id="bil_meter" type="text" placeholder="ID Pelanggan..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-emerald-700 text-center text-xl" />
                                        <input id="bil_amount" type="number" placeholder="Total Tagihan..." className="w-full p-5 bg-slate-50 rounded-2xl font-black text-emerald-600 text-center text-3xl" />
                                        <button onClick={() => {
                                            const m = document.getElementById('bil_meter').value;
                                            const v = Number(document.getElementById('bil_amount').value);
                                            if(!m || !v) return notify("Lengkapi data!", "error");
                                            addToCart({ id: `BIL-${Date.now()}`, name: `TAGIHAN PLN`, price: v + ADMIN_FEE, type: 'ppob', meterId: m, quantity: 1 });
                                        }} className="w-full bg-emerald-600 text-white py-6 rounded-2xl font-black shadow-lg">TAMBAH</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="space-y-6 animate-in fade-in max-w-6xl mx-auto">
                                <div className="flex justify-between items-center bg-white p-8 rounded-3xl border shadow-xl">
                                    <div><h2 className="text-3xl font-black italic">GUDANG ALFEEN</h2><p className="text-[10px] font-bold text-slate-400">Total {inventory.length} Produk</p></div>
                                    <button onClick={()=>{setEditingItem(null);setIsModalOpen(true);}} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl">+ PRODUK</button>
                                </div>
                                <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden overflow-x-auto no-scrollbar">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="p-8">Produk</th><th className="p-8">Harga Jual</th><th className="p-8">Modal</th><th className="p-8">Stok</th><th className="p-8 text-center">Aksi</th></tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {inventory.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="p-8"><p className="font-black">{p.name}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest">{p.barcode}</p></td>
                                                    <td className="p-8 text-indigo-600 font-black">{CURRENCY} {p.price.toLocaleString()}</td>
                                                    <td className="p-8 text-slate-400">{CURRENCY} {p.cost_price?.toLocaleString()}</td>
                                                    <td className="p-8"><span className={`px-4 py-1.5 rounded-full text-[10px] font-black border ${p.stock < 10 ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{p.stock} UNIT</span></td>
                                                    <td className="p-8"><div className="flex justify-center gap-2">
                                                        <button onClick={()=>{setEditingItem(p);setIsModalOpen(true);}} className="p-2 text-indigo-400 hover:bg-indigo-50 rounded-lg"><i data-lucide="edit-3"></i></button>
                                                        <button onClick={async () => {
                                                            if(window.confirm('Hapus barang ini secara permanen dari Cloud?')) {
                                                                const { error } = await supabase.from('products').delete().eq('id', p.id);
                                                                if(!error) fetchData();
                                                                else notify("Gagal hapus: " + error.message, "error");
                                                            }
                                                        }} className="p-2 text-rose-300 hover:bg-rose-50 rounded-lg"><i data-lucide="trash-2"></i></button>
                                                    </div></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6 animate-in fade-in max-w-6xl mx-auto">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2 px-2">
                                        <i data-lucide="calendar" className="w-5 text-indigo-500"></i>
                                        <h3 className="font-black text-xs uppercase tracking-widest text-slate-500">Statistik Hari Ini</h3>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        <StatCard label="Omzet Hari Ini" val={stats.todayRevenue} color="indigo" />
                                        <StatCard label="Laba Hari Ini" val={stats.todayProfit} color="emerald" />
                                    </div>
                                </div>

                                <div className="space-y-4 pt-4">
                                    <div className="flex items-center gap-2 px-2">
                                        <i data-lucide="bar-chart-2" className="w-5 text-slate-400"></i>
                                        <h3 className="font-black text-xs uppercase tracking-widest text-slate-500">Statistik Keseluruhan</h3>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                        <StatCard label="Total Omzet" val={stats.totalRevenue} color="slate" />
                                        <StatCard label="Total Laba" val={stats.totalProfit} color="slate" />
                                        <StatCard label="Total Transaksi" val={stats.totalTransactions} color="amber" noCurrency />
                                    </div>
                                </div>

                                <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden mt-8">
                                    <div className="p-6 border-b flex justify-between items-center bg-slate-50/50">
                                        <h3 className="font-black uppercase text-xs tracking-widest">Riwayat Transaksi Cloud</h3>
                                        <button onClick={() => {
                                            const csv = "ID,Waktu,Total,Untung\n" + sales.map(s => `${s.id},${s.timestamp},${s.total},${s.profit}`).join("\n");
                                            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'})); a.download = 'Laporan_Alfeen.csv'; a.click();
                                        }} className="text-[10px] font-black text-indigo-600 bg-white border-2 border-indigo-50 px-6 py-2 rounded-xl shadow-sm hover:bg-indigo-50">EXPORT EXCEL</button>
                                    </div>
                                    <div className="divide-y divide-slate-50">
                                        {sales.map(s => (
                                            <div key={s.id} className="p-8 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                                <div>
                                                    <p className="font-black text-slate-900 text-lg tracking-tighter leading-none mb-1 group-hover:text-indigo-600 transition-colors">{s.id}</p>
                                                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tight">{new Date(s.timestamp).toLocaleString('id-ID')}</p>
                                                </div>
                                                <div className="text-right flex items-center gap-6">
                                                    <div>
                                                        <p className="font-black text-indigo-600 text-xl tracking-tighter leading-none mb-1">{CURRENCY} {(s.total || 0).toLocaleString()}</p>
                                                        <p className="text-[10px] text-emerald-600 font-bold uppercase tracking-tight">Laba: {CURRENCY} {(s.profit || 0).toLocaleString()}</p>
                                                    </div>
                                                    <button onClick={() => setLastReceipt(s)} className="p-3 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><i data-lucide="printer"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ai' && (
                            <div className="max-w-3xl mx-auto py-16 text-center space-y-12 animate-in slide-in-from-bottom-12">
                                <div className="space-y-6">
                                    <div className="w-32 h-32 bg-indigo-600 rounded-[3.5rem] flex items-center justify-center text-white mx-auto shadow-2xl animate-pulse ring-[14px] ring-indigo-50/50">
                                        <i data-lucide="brain-circuit" className="w-14 h-14"></i>
                                    </div>
                                    <h2 className="text-4xl font-black text-slate-950 uppercase tracking-tighter">AI Business Advisor</h2>
                                    <p className="text-slate-500 font-medium max-w-md mx-auto leading-relaxed text-lg italic">Analisis otomatis perputaran barang dan profitabilitas warung Anda.</p>
                                </div>
                                <button onClick={runAI} disabled={isAiLoading} className="bg-slate-900 text-white px-14 py-6 rounded-[2.5rem] font-black shadow-2xl active:scale-95 transition-all disabled:opacity-50 uppercase text-xs tracking-widest">
                                    {isAiLoading ? "Menganalisis Performa..." : "Mulai Analisis Sekarang"}
                                </button>
                                {aiAnalysis && (
                                    <div className="bg-white p-12 rounded-[4rem] border-4 border-white text-left shadow-2xl animate-in zoom-in-95 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-10 opacity-5 text-indigo-600"><i data-lucide="brain-circuit" className="w-40 h-40"></i></div>
                                        <div className="flex items-center gap-3 text-indigo-600 font-black uppercase text-[10px] tracking-widest mb-10 bg-indigo-50 w-fit px-6 py-2.5 rounded-2xl border border-indigo-100">
                                            <i data-lucide="check-circle-2" className="w-4"></i> Laporan Strategi Alfeen Store
                                        </div>
                                        <div className="prose prose-indigo max-w-none text-slate-700 whitespace-pre-wrap font-medium leading-relaxed">
                                            {aiAnalysis}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Modals remain same as previous version but with optimized IDs */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[1000] flex items-center justify-center p-6 overflow-y-auto">
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                const data = Object.fromEntries(fd.entries());
                                const payload = { name: data.name, barcode: data.barcode, category: data.category, price: Number(data.price), cost_price: Number(data.cost_price), stock: Number(data.stock) };
                                const { error } = editingItem ? await supabase.from('products').update(payload).eq('id', editingItem.id) : await supabase.from('products').insert([payload]);
                                if(!error) { setIsModalOpen(false); fetchData(); notify("Cloud Sinkron!"); }
                                else notify("Error Simpan", "error");
                            }} className="bg-white w-full max-w-xl rounded-[4rem] p-12 space-y-6 shadow-2xl my-auto border-[6px] border-white relative">
                                <div className="flex justify-between items-center"><h3 className="text-2xl font-black uppercase italic">{editingItem ? 'Edit Produk' : 'Produk Baru'}</h3><button type="button" onClick={()=>{stopScanner("reader-modal");setIsModalOpen(false);}} className="p-4 bg-slate-50 rounded-2xl"><i data-lucide="x"></i></button></div>
                                <div className="space-y-4">
                                    <div className="space-y-1"><label className="text-[11px] font-black text-slate-400 uppercase ml-2 tracking-widest">Barcode</label>
                                    <div className="flex gap-4"><input name="barcode" id="product_barcode" defaultValue={editingItem?.barcode} required placeholder="Scan..." className="flex-1 p-6 bg-slate-50 rounded-[1.8rem] font-black outline-none border-4 border-transparent focus:border-indigo-100 text-xl shadow-inner" />
                                    <button type="button" onClick={()=>isScanningModal ? stopScanner("reader-modal") : startScanner("reader-modal")} className={`p-6 rounded-[1.8rem] shadow-xl active:scale-90 ${isScanningModal ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`}><i data-lucide={isScanningModal ? "x" : "camera"}></i></button></div>
                                    {isScanningModal && (
                                        <div className="relative aspect-square rounded-[3rem] overflow-hidden bg-black mt-4 border-[6px] border-slate-50">
                                            <div id="reader-modal" className="w-full h-full"></div>
                                            <div className="animate-scanner-line"></div>
                                            <button type="button" onClick={() => toggleFlash("reader-modal")} className="absolute top-4 right-4 z-40 p-4 bg-black/40 backdrop-blur-md text-white rounded-full border border-white/20">
                                                <i data-lucide="zap" className={isFlashOn ? 'text-yellow-400' : ''}></i>
                                            </button>
                                        </div>
                                    )}</div>
                                    <input name="name" defaultValue={editingItem?.name} required placeholder="Nama Barang..." className="w-full p-6 bg-slate-50 rounded-[1.8rem] outline-none font-black border-4 border-transparent focus:border-indigo-50" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="price" defaultValue={editingItem?.price} type="number" required placeholder="H. Jual" className="p-6 bg-indigo-50 rounded-[1.8rem] font-black text-indigo-700 text-3xl text-center outline-none border-4 border-transparent focus:border-indigo-200" />
                                        <input name="cost_price" defaultValue={editingItem?.cost_price} type="number" required placeholder="H. Modal" className="p-6 bg-slate-50 rounded-[1.8rem] font-black text-slate-400 text-2xl text-center outline-none border-4 border-transparent focus:border-slate-100" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="stock" defaultValue={editingItem?.stock} type="number" required placeholder="Stok" className="p-6 bg-slate-50 rounded-[1.8rem] font-black text-slate-800 text-3xl text-center outline-none border-4 border-transparent focus:border-emerald-100" />
                                        <select name="category" defaultValue={editingItem?.category || 'Sembako'} className="w-full p-6 bg-slate-50 rounded-[1.8rem] font-black text-sm border-4 border-transparent"><option>Sembako</option><option>Snack</option><option>Minuman</option><option>Lainnya</option></select>
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-indigo-600 text-white py-7 rounded-[2.5rem] font-black uppercase shadow-2xl active:scale-95 transition-all">SIMPAN KE CLOUD</button>
                            </form>
                        </div>
                    )}

                    {lastReceipt && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[2000] flex items-center justify-center p-6 overflow-y-auto">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 my-auto relative">
                                <div ref={receiptRef} className="p-10 bg-white text-slate-800 space-y-8">
                                    <div className="text-center border-b border-dashed border-slate-200 pb-10">
                                        <h2 className="font-black text-3xl uppercase text-indigo-600 mb-2 italic tracking-tighter">{APP_NAME}</h2>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{APP_ADDRESS}</p>
                                        <div className="flex justify-between text-[8px] font-black text-slate-300 mt-6 pt-6 border-t uppercase tracking-widest">
                                            <span>{lastReceipt.id}</span>
                                            <span>{new Date(lastReceipt.timestamp).toLocaleDateString('id-ID')}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-4 py-2">
                                        {(lastReceipt.items || []).map((it, idx) => (
                                            <div key={idx} className="flex justify-between text-xs items-start">
                                                <div className="flex-1 pr-6 leading-tight"><p className="font-black text-slate-900">{it.name}</p>
                                                {it.meterId && <p className="text-[8px] text-indigo-500 font-black mt-1 bg-indigo-600 px-2 py-0.5 rounded leading-none">ID: {it.meterId}</p>}
                                                <p className="text-[9px] font-bold text-slate-400">{it.quantity} x {it.price.toLocaleString()}</p></div>
                                                <span className="font-black text-slate-900">{(it.price * it.quantity).toLocaleString()}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="border-t border-dashed border-slate-200 pt-10 space-y-4 font-black">
                                        {lastReceipt.discount > 0 && <div className="flex justify-between text-[11px] text-rose-500 italic"><span>DISKON</span><span>-{lastReceipt.discount.toLocaleString()}</span></div>}
                                        <div className="flex justify-between text-2xl text-indigo-600 tracking-tighter"><span>TOTAL</span><span>{lastReceipt.total.toLocaleString()}</span></div>
                                        <div className="flex justify-between text-[12px] text-emerald-600 pt-4 border-t border-slate-50 uppercase tracking-widest"><span>KEMBALIAN</span><span>{lastReceipt.change_amount.toLocaleString()}</span></div>
                                    </div>
                                    <div className="text-center border-t border-dashed pt-6">
                                        <p className="text-xs font-bold italic text-slate-800">Haturnuhun Tos Balanja</p>
                                    </div>
                                </div>
                                <div className="p-10 bg-slate-50 border-t flex flex-col gap-4">
                                    <button onClick={downloadReceipt} className="w-full bg-white border-4 border-white shadow-xl py-5 rounded-[1.8rem] font-black text-indigo-600 flex items-center justify-center gap-3 hover:bg-slate-100 transition-all active:scale-95"><i data-lucide="image"></i> Gambar JPEG</button>
                                    <button onClick={()=>setLastReceipt(null)} className="w-full bg-indigo-600 text-white py-5 rounded-[1.8rem] font-black shadow-2xl active:scale-95 transition-all">TUTUP</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const NavBtn = ({ id, icon, label, active, set }) => (
            <button onClick={() => set(id)} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-black text-sm transition-all duration-300 ${active === id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-500/50 translate-x-2' : 'text-slate-500 hover:bg-slate-800'}`}><i data-lucide={icon} className="w-5"></i> {label}</button>
        );

        const MobileNavBtn = ({ id, icon, active, set }) => (
            <button onClick={() => set(id)} className={`p-5 rounded-2xl transition-all duration-500 ${active === id ? 'bg-indigo-600 text-white shadow-2xl -translate-y-6 scale-110' : 'text-slate-400'}`}><i data-lucide={icon} className="w-6 h-6"></i></button>
        );

        const StatCard = ({ label, val, color, noCurrency }) => (
            <div className={`bg-white p-10 rounded-[3rem] border-4 ${color === 'indigo' ? 'border-indigo-100' : color === 'emerald' ? 'border-emerald-100' : 'border-white'} shadow-xl relative overflow-hidden group hover:shadow-2xl transition-all`}>
                <div className="relative z-10 space-y-4 font-black">
                    <p className="text-[10px] text-slate-400 uppercase tracking-widest">{label}</p>
                    <p className={`text-3xl tracking-tighter ${color === 'emerald' ? 'text-emerald-600' : color === 'indigo' ? 'text-indigo-600' : 'text-slate-900'}`}>
                        {!noCurrency && CURRENCY + ' '} {(val || 0).toLocaleString()}
                    </p>
                </div>
                <div className="absolute -right-8 -bottom-8 opacity-[0.03] group-hover:scale-110 transition-transform duration-1000">
                    <i data-lucide={label.includes('Laba') ? 'trending-up' : 'bar-chart-3'} className="w-40 h-40"></i>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
