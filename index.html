<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARUNG ALFEEN - Cloud POS & Piutang</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        @keyframes scanner-line { 0% { top: 10%; opacity: 0; } 50% { opacity: 1; } 100% { top: 90%; opacity: 0; } }
        .animate-scanner-line { position: absolute; left: 5%; width: 90%; height: 2px; background: #4F46E5; box-shadow: 0 0 15px #4F46E5; animation: scanner-line 2s infinite ease-in-out; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #reader video, #reader-modal video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #reader__dashboard_section_swaplink, #reader-modal__dashboard_section_swaplink { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const SUPABASE_URL = "https://xhfhmtunsbechgnzgkur.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-P2eIz6XnQ2a4xt4-3ANMQ_7nxWHYfD";
        const APP_NAME = "WARUNG ALFEEN";
        const APP_ADDRESS = "Kp. Cikabodas - Tamanjaya";
        const ADMIN_FEE = 3000;
        const CURRENCY = "Rp";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [activeTab, setActiveTab] = useState('cashier');
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [debtors, setDebtors] = useState([]);
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isScanningModal, setIsScanningModal] = useState(false);
            const [isFlashOn, setIsFlashOn] = useState(false);
            const [notification, setNotification] = useState(null);
            const [cashReceived, setCashReceived] = useState('');
            const [discount, setDiscount] = useState('');
            const [lastReceipt, setLastReceipt] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [debtorModal, setDebtorModal] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || '');

            const scannerRef = useRef(null);
            const modalScannerRef = useRef(null);
            const receiptRef = useRef(null);

            const fetchData = async () => {
                try {
                    const { data: p } = await supabase.from('products').select('*').order('name');
                    const { data: s } = await supabase.from('sales').select('*').order('timestamp', { ascending: false });
                    const { data: d } = await supabase.from('debtors').select('*').order('total_debt', { ascending: false });
                    if (p) setInventory(p);
                    if (s) setSales(s || []);
                    if (d) setDebtors(d || []);
                } catch (e) { console.error("Cloud Error", e); }
            };

            useEffect(() => { fetchData(); }, []);
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [activeTab, inventory, isScanning, isScanningModal, debtors, sales, lastReceipt]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const subtotal = useMemo(() => cart.reduce((s, i) => s + (i.price * i.quantity), 0), [cart]);
            const cartTotal = useMemo(() => Math.max(0, subtotal - (Number(discount) || 0)), [subtotal, discount]);
            const changeAmount = cashReceived ? Number(cashReceived) - cartTotal : 0;

            const stats = useMemo(() => {
                const today = new Date().toLocaleDateString('en-CA');
                const totals = sales.reduce((acc, s) => {
                    const sDate = new Date(s.timestamp).toLocaleDateString('en-CA');
                    const total = Number(s.total) || 0;
                    const profit = Number(s.profit) || 0;
                    const isDebt = s.is_debt === true || s.is_debt === 'true';
                    
                    acc.totalRevenue += total;
                    acc.totalProfit += profit;

                    if (sDate === today) {
                        acc.todayRevenue += total;
                        acc.todayProfit += profit;
                        if (isDebt) acc.todayDebt += total;
                        else acc.todayCash += total;
                    }
                    return acc;
                }, { todayRevenue: 0, todayProfit: 0, todayDebt: 0, todayCash: 0, totalRevenue: 0, totalProfit: 0 });

                const totalPiutangRil = debtors.reduce((sum, d) => sum + (Number(d.total_debt) || 0), 0);
                return { ...totals, totalPiutang: totalPiutangRil, totalTransactions: sales.length };
            }, [sales, debtors]);

            // UPDATE KUANTITAS (Tombol +/-)
            const updateCartQty = (idx, delta) => {
                const newCart = [...cart];
                const item = newCart[idx];
                const newQty = item.quantity + delta;
                if (newQty <= 0) newCart.splice(idx, 1);
                else {
                    const invP = inventory.find(i => i.id === item.id);
                    if(delta > 0 && invP && newQty > invP.stock && item.type !== 'ppob') return notify("Stok limit", "error");
                    newCart[idx].quantity = newQty;
                }
                setCart(newCart);
            };

            // SET KUANTITAS MANUAL (Ketik Langsung)
            const setManualQty = (idx, val) => {
                const newCart = [...cart];
                const item = newCart[idx];
                const inputVal = parseInt(val);
                
                // Jika input kosong atau bukan angka, biarkan atau set minimal 1
                if (isNaN(inputVal) || val === "") {
                    newCart[idx].quantity = ""; // Biarkan kosong sementara agar user bisa ngetik
                } else if (inputVal <= 0) {
                    newCart.splice(idx, 1);
                } else {
                    const invP = inventory.find(i => i.id === item.id);
                    if (invP && inputVal > invP.stock && item.type !== 'ppob') {
                        notify(`Stok terbatas (Sisa: ${invP.stock})`, "error");
                        newCart[idx].quantity = invP.stock;
                    } else {
                        newCart[idx].quantity = inputVal;
                    }
                }
                setCart(newCart);
            };

            const addToCart = (p) => {
                if (p.type !== 'ppob' && p.stock <= 0) return notify("Stok habis!", "error");
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id && item.meterId === p.meterId);
                    if (exists && p.type !== 'ppob') {
                        if(exists.quantity >= p.stock) { notify("Stok limit", "error"); return prev; }
                        return prev.map(item => item.id === p.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...p, quantity: 1 }];
                });
                notify(`${p.name} ditambahkan`);
            };

            const checkout = async (isDebt = false, debtorId = null) => {
                if (cart.length === 0) return;
                // Pastikan tidak ada quantity yang masih string kosong sebelum checkout
                if (cart.some(it => it.quantity === "")) return notify("Lengkapi jumlah barang!", "error");
                if (!isDebt && (!cashReceived || changeAmount < 0)) return notify("Lengkapi pembayaran!", "error");
                
                try {
                    notify("Menyimpan ke Cloud...", "success");
                    const totalMargin = cart.reduce((sum, item) => {
                        const margin = item.type === 'ppob' ? ADMIN_FEE : (item.price - (item.cost_price || 0));
                        return sum + (margin * item.quantity);
                    }, 0);
                    const finalProfit = totalMargin - (Number(discount) || 0);
                    const trxId = `TRX-${Date.now()}`;

                    const saleData = {
                        id: trxId, items: cart, total: Number(cartTotal), profit: Number(finalProfit),
                        discount: Number(discount) || 0, subtotal: Number(subtotal),
                        payment: isDebt ? 0 : Number(cashReceived), change_amount: isDebt ? 0 : Number(changeAmount),
                        is_debt: isDebt, debtor_id: debtorId, timestamp: new Date().toISOString()
                    };

                    const { error: saleErr } = await supabase.from('sales').insert([saleData]);
                    if (saleErr) throw saleErr;

                    for (const item of cart) {
                        if (item.type !== 'ppob') {
                            await supabase.from('products').update({ stock: item.stock - item.quantity }).eq('id', item.id);
                        }
                    }

                    if (isDebt && debtorId) {
                        const debtor = debtors.find(d => d.id === debtorId);
                        const newTotalDebt = (Number(debtor.total_debt) || 0) + cartTotal;
                        await supabase.from('debtors').update({ total_debt: newTotalDebt }).eq('id', debtorId);
                        await supabase.from('debt_history').insert([{ debtor_id: debtorId, amount: cartTotal, description: `Belanja: ${trxId}` }]);
                    }

                    setLastReceipt(saleData);
                    setCart([]); setCashReceived(''); setDiscount(''); setDebtorModal(false);
                    fetchData();
                    notify(isDebt ? "Hutang dicatat!" : "Berhasil!");
                } catch (err) { notify("Error: " + err.message, "error"); }
            };

            const runAI = async () => {
                if (!geminiKey) {
                    setAiAnalysis("Mohon masukkan 'Gemini API Key' pada kotak di bawah untuk analisis profesional.\n\nAnalisis Cepat Alfeen:\n1. Omzet hari ini Rp " + stats.todayRevenue.toLocaleString() + ".\n2. Ada " + inventory.filter(i => i.stock < 10).length + " produk stok rendah.\n3. Segera tagih piutang pelanggan untuk menjaga arus kas.");
                    return;
                }
                setIsAiLoading(true);
                try {
                    const low = inventory.filter(i => i.stock < 10).map(i => i.name).join(", ");
                    const prompt = `Analisis Warung Alfeen: Hari ini Omzet Rp${stats.todayRevenue}, Laba Rp${stats.todayProfit}. Total Piutang: Rp${stats.totalPiutang}. Produk stok rendah: ${low || 'Semua aman'}. Berikan 3 saran strategi bisnis singkat dan padat dalam bahasa Indonesia.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const resData = await response.json();
                    if (resData.error) throw new Error(resData.error.message);
                    setAiAnalysis(resData.candidates[0].content.parts[0].text);
                } catch (e) { setAiAnalysis("Gagal menghubungi AI: " + e.message); } 
                finally { setIsAiLoading(false); }
            };

            const exportSoldProducts = () => {
                if (!sales || sales.length === 0) return notify("Data kosong", "error");
                const productMap = {};
                sales.forEach(sale => {
                    (sale.items || []).forEach(item => {
                        const key = item.id || item.name;
                        if (!productMap[key]) { productMap[key] = { name: item.name, qty: 0, revenue: 0 }; }
                        productMap[key].qty += Number(item.quantity) || 0;
                        productMap[key].revenue += (Number(item.price) * (Number(item.quantity) || 0));
                    });
                });
                const csvRows = ["Nama Produk,Total Terjual,Total Omzet"];
                Object.values(productMap).sort((a,b) => b.qty - a.qty).forEach(p => {
                    csvRows.push(`"${p.name}",${p.qty},${p.revenue}`);
                });
                const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Analisa_Produk_Alfeen_${new Date().toLocaleDateString()}.csv`;
                a.click();
                notify("Export Analisa Produk Berhasil!");
            };

            const startScanner = async (target = "reader") => {
                const isMain = target === "reader";
                isMain ? setIsScanning(true) : setIsScanningModal(true);
                setTimeout(async () => {
                    const html5QrCode = new window.Html5Qrcode(target);
                    isMain ? scannerRef.current = html5QrCode : modalScannerRef.current = html5QrCode;
                    try {
                        await html5QrCode.start({ facingMode: "environment" }, {
                            fps: 30, qrbox: (w, h) => ({ width: w * 0.8, height: w * 0.45 })
                        }, (decodedText) => {
                            if(navigator.vibrate) navigator.vibrate(80);
                            if(isMain) {
                                const p = inventory.find(i => i.barcode === decodedText);
                                if (p) { addToCart(p); stopScanner("reader"); }
                                else notify("Barang tidak ada", "error");
                            } else {
                                const input = document.getElementById('product_barcode');
                                if(input) input.value = decodedText;
                                stopScanner("reader-modal");
                            }
                        });
                    } catch (err) { isMain ? setIsScanning(false) : setIsScanningModal(false); }
                }, 400);
            };

            const stopScanner = async (target = "reader") => {
                const isMain = target === "reader";
                const ref = isMain ? scannerRef : modalScannerRef;
                if (ref.current) { try { await ref.current.stop(); ref.current = null; } catch (e) {} }
                isMain ? setIsScanning(false) : setIsScanningModal(false);
                setIsFlashOn(false);
            };

            const toggleFlash = async (target = "reader") => {
                const ref = target === "reader" ? scannerRef : modalScannerRef;
                if (ref.current && ref.current.isScanning) {
                    const next = !isFlashOn;
                    try { await ref.current.applyVideoConstraints({ advanced: [{ torch: next }] }); setIsFlashOn(next); } catch (e) { notify("Flash error", "error"); }
                }
            };

            const downloadReceipt = () => {
                if(!receiptRef.current) return;
                window.html2canvas(receiptRef.current, { scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Alfeen_${lastReceipt.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                });
            };

            return (
                <div className="min-h-screen pb-24 lg:pb-0 lg:pl-64 flex flex-col">
                    <aside className="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-slate-900 text-white flex-col p-6 z-50 shadow-2xl">
                        <div className="mb-10"><h1 className="text-2xl font-black text-indigo-400 italic uppercase">Alfeen POS</h1></div>
                        <nav className="space-y-2 flex-1">
                            <NavBtn id="cashier" icon="layout-dashboard" label="Kasir" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ppob" icon="zap" label="Listrik" active={activeTab} set={setActiveTab} />
                            <NavBtn id="inventory" icon="package" label="Gudang" active={activeTab} set={setActiveTab} />
                            <NavBtn id="piutang" icon="users" label="Piutang" active={activeTab} set={setActiveTab} />
                            <NavBtn id="history" icon="history" label="Rekap" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ai" icon="brain-circuit" label="Asisten AI" active={activeTab} set={setActiveTab} />
                        </nav>
                    </aside>

                    <nav className="lg:hidden fixed bottom-0 left-0 w-full glass-nav z-[100] px-4 py-3 flex justify-around items-center rounded-t-3xl shadow-2xl">
                        <MobileNavBtn id="cashier" icon="layout-dashboard" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ppob" icon="zap" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="inventory" icon="package" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="piutang" icon="users" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="history" icon="history" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ai" icon="brain-circuit" active={activeTab} set={setActiveTab} />
                    </nav>

                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl bg-slate-900 text-white font-bold text-xs flex items-center gap-2 shadow-2xl animate-in slide-in-from-top-4">
                            <div className={`w-2 h-2 rounded-full ${notification.type === 'error' ? 'bg-rose-500' : 'bg-emerald-400'}`}></div>
                            {notification.msg}
                        </div>
                    )}

                    <main className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {activeTab === 'cashier' && (
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                <div className="xl:col-span-2 space-y-6">
                                    <div className="flex gap-3">
                                        <div className="relative flex-1">
                                            <input type="text" placeholder="Cari barang atau scan..." className="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border shadow-sm outline-none font-bold" onChange={e => setSearchTerm(e.target.value)} />
                                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5"></i>
                                        </div>
                                        <button onClick={() => isScanning ? stopScanner("reader") : startScanner("reader")} className={`px-6 rounded-2xl font-bold flex items-center shadow-lg transition-all ${isScanning ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`}>
                                            <i data-lucide={isScanning ? "x" : "camera"}></i>
                                        </button>
                                    </div>
                                    {isScanning && (
                                        <div className="relative aspect-video rounded-3xl overflow-hidden bg-black border-4 border-white shadow-2xl">
                                            <div id="reader" className="w-full h-full"></div>
                                            <div className="animate-scanner-line"></div>
                                            <button onClick={() => toggleFlash("reader")} className="absolute top-4 right-4 z-20 p-4 bg-black/40 text-white rounded-full"><i data-lucide="zap" className={isFlashOn ? 'text-yellow-400' : ''}></i></button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {inventory.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <button key={p.id} onClick={() => addToCart(p)} className="bg-white p-4 rounded-3xl border shadow-sm hover:shadow-xl active:scale-95 text-left flex flex-col h-full group">
                                                <h3 className="font-bold text-sm text-slate-800 flex-1 leading-tight">{p.name}</h3>
                                                <p className="text-lg font-black text-indigo-600 mt-2">{CURRENCY} {p.price.toLocaleString()}</p>
                                                <p className="text-[10px] text-slate-400">Sisa {p.stock}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border shadow-2xl flex flex-col h-fit sticky top-8 overflow-hidden">
                                    <div className="p-6 border-b bg-slate-50 font-black text-lg flex justify-between"><h2>PESANAN</h2><button onClick={()=>setCart([])} className="text-rose-400 text-xs">HAPUS</button></div>
                                    <div className="p-6 space-y-4 max-h-[40vh] overflow-y-auto custom-scrollbar">
                                        {cart.length === 0 ? (
                                            <div className="py-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic">Belum Ada Barang</div>
                                        ) : cart.map((it, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-white">
                                                <div className="flex-1 pr-4"><p className="text-xs font-black leading-tight">{it.name}</p>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <button onClick={() => updateCartQty(idx, -1)} className="w-8 h-8 bg-white rounded-lg shadow-sm border border-slate-100 flex items-center justify-center font-bold">-</button>
                                                    <input 
                                                        type="number" 
                                                        value={it.quantity} 
                                                        onChange={(e) => setManualQty(idx, e.target.value)}
                                                        className="w-12 h-8 text-center font-black text-xs bg-white border border-slate-100 rounded-lg outline-none focus:border-indigo-300"
                                                    />
                                                    <button onClick={() => updateCartQty(idx, 1)} className="w-8 h-8 bg-white rounded-lg shadow-sm border border-slate-100 flex items-center justify-center font-bold">+</button>
                                                </div></div>
                                                <p className="font-black text-indigo-600 text-sm">{(it.price * (it.quantity || 0)).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-8 bg-slate-50 border-t space-y-4">
                                        <div className="flex justify-between px-2 text-[10px] font-black text-slate-400"><span>SUBTOTAL</span><span>{CURRENCY} {subtotal.toLocaleString()}</span></div>
                                        <input type="number" placeholder="Diskon (Rp)..." className="w-full p-3 bg-white rounded-xl font-bold text-rose-500 shadow-inner border border-rose-50" value={discount} onChange={e => setDiscount(e.target.value)} />
                                        <div className="flex justify-between items-end border-t pt-2">
                                            <span className="text-[11px] font-black text-indigo-500 uppercase">Total</span>
                                            <span className="text-4xl font-black text-slate-900">{CURRENCY} {cartTotal.toLocaleString()}</span>
                                        </div>
                                        <input type="number" placeholder="Bayar Tunai..." className="w-full p-4 bg-white rounded-2xl font-black text-center text-3xl text-indigo-600 shadow-sm border-2 border-transparent focus:border-indigo-100" value={cashReceived} onChange={e => setCashReceived(e.target.value)} />
                                        <div className="flex justify-between px-2 font-black"><span className="text-[10px] text-slate-400 uppercase">Kembalian</span><span className={`text-xl ${changeAmount < 0 ? 'text-rose-500' : 'text-emerald-600'}`}>{CURRENCY} {changeAmount.toLocaleString()}</span></div>
                                        <div className="grid grid-cols-2 gap-3 pt-4">
                                            <button onClick={() => setDebtorModal(true)} disabled={cart.length === 0} className="bg-slate-900 text-white py-4 rounded-2xl font-black text-xs">HUTANG</button>
                                            <button onClick={() => checkout(false)} disabled={cart.length === 0 || !cashReceived || changeAmount < 0} className="bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs shadow-xl">BAYAR CASH</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ppob' && (
                             <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                                <div className="text-center py-6"><h2 className="text-4xl font-black uppercase italic tracking-tighter">Token & Tagihan Listrik</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6">
                                        <h3 className="font-black uppercase italic text-indigo-600">Token Listrik</h3>
                                        <input id="tkn_meter" type="text" placeholder="No. Meter..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-indigo-700 text-center text-xl" />
                                        <div className="grid grid-cols-3 gap-3">
                                            {[20000, 50000, 100000, 200000, 500000, 1000000].map(d => (
                                                <button key={d} onClick={() => {
                                                    const m = document.getElementById('tkn_meter').value;
                                                    if(!m) return notify("Isi No Meter!", "error");

            const [payAmount, setPayAmount] = useState('');

            const addDebtor = async (e) => {
                e.preventDefault();
                const { error } = await supabase.from('debtors').insert([{ name: newName, phone: newPhone, total_debt: 0 }]);
                if (!error) { setShowModal(false); setNewName(''); setNewPhone(''); refresh(); notify("Nama Pelanggan Berhasil Ditambah"); }
            };

            const payDebt = async () => {
                const amount = Number(payAmount);
                if (!amount || amount <= 0) return;
                try {
                    await supabase.from('debt_history').insert([{ debtor_id: payModal.id, amount: -amount, description: "Pembayaran Cicilan" }]);
                    await supabase.from('debtors').update({ total_debt: Number(payModal.total_debt) - amount }).eq('id', payModal.id);
                    setPayModal(null); setPayAmount(''); refresh(); notify("Pembayaran Berhasil Dicatat");
                } catch(e) { notify("Error Pembayaran", "error"); }
            };

            return (
                <div className="space-y-10 animate-in fade-in max-w-6xl mx-auto">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8 bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl relative overflow-hidden flex-1">
                            <div className="relative z-10 text-center md:text-left">
                                <h2 className="text-4xl font-black uppercase italic tracking-tighter text-slate-950 leading-none">Buku Piutang</h2>
                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mt-4">Monitoring Kasbon Pelanggan</p>
                            </div>
                            <button onClick={() => setShowModal(true)} className="w-full md:w-auto relative z-10 bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all text-xs tracking-widest uppercase">+ TAMBAH PELANGGAN</button>
                        </div>
                        <StatCard label="Total Piutang Toko" val={stats.totalPiutang} color="rose" icon="landmark" />
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {debtors.map(d => (
                            <div key={d.id} className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl flex flex-col group hover:shadow-2xl transition-all relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-8 opacity-5 text-slate-950 group-hover:scale-125 transition-transform"><i data-lucide="user" className="w-24 h-24"></i></div>
                                <p className="text-[10px] font-black uppercase text-indigo-400 tracking-widest mb-3">Pelanggan</p>
                                <h3 className="text-2xl font-black text-slate-800 tracking-tight leading-none mb-1">{d.name}</h3>
                                <p className="text-[11px] font-bold text-slate-400 tracking-tight">{d.phone || 'No Handphone Belum Ada'}</p>
                                <div className="mt-12 pt-8 border-t border-slate-50 flex justify-between items-end mb-10">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sisa Kasbon</span>
                                    <span className="text-3xl font-black text-rose-500 tracking-tighter leading-none">Rp {(d.total_debt || 0).toLocaleString()}</span>
                                </div>
                                <button onClick={() => setPayModal(d)} disabled={d.total_debt <= 0} className="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-emerald-50 active:scale-95 disabled:opacity-30 transition-all">Bayar / Cicil Kasbon</button>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[1000] flex items-center justify-center p-6">
                            <form onSubmit={addDebtor} className="bg-white w-full max-w-md rounded-[3rem] p-12 space-y-8 shadow-2xl border-[6px] border-white">
                                <h3 className="text-3xl font-black uppercase italic border-b pb-8 text-center tracking-tighter">Pelanggan Baru</h3>
                                <div className="space-y-6">
                                    <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 ml-2 tracking-widest">Nama Lengkap</label><input placeholder="Contoh: Pak Budi" required className="w-full p-6 bg-slate-50 border-4 border-transparent focus:border-indigo-100 rounded-3xl font-bold outline-none" value={newName} onChange={e=>setNewName(e.target.value)} /></div>
                                    <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 ml-2 tracking-widest">Nomor WhatsApp</label><input placeholder="08xxxx" className="w-full p-6 bg-slate-50 border-4 border-transparent focus:border-indigo-100 rounded-3xl font-bold outline-none" value={newPhone} onChange={e=>setNewPhone(e.target.value)} /></div>
                                </div>
                                <div className="flex gap-4 pt-4"><button type="button" onClick={()=>setShowModal(false)} className="flex-1 py-5 text-slate-400 font-black uppercase text-[10px] tracking-widest">Batal</button><button type="submit" className="flex-1 bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Simpan Nama</button></div>
                            </form>
                        </div>
                    )}

                    {payModal && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[1000] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-md rounded-[3rem] p-12 space-y-8 shadow-2xl border-[6px] border-white">
                                <div className="text-center">
                                    <h3 className="text-3xl font-black uppercase italic tracking-tighter">Terima Pembayaran</h3>
                                    <p className="font-bold text-slate-400 mt-2 uppercase text-[10px] tracking-widest leading-none">Membayar Hutang: <span className="text-indigo-600">{payModal.name}</span></p>
                                </div>
                                <div className="relative pt-4">
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-200 text-4xl mt-2">Rp</span>
                                    <input type="number" placeholder="0" className="w-full pl-20 pr-8 py-10 bg-slate-50 border-4 border-emerald-50 rounded-[2.5rem] font-black text-6xl text-emerald-600 text-center outline-none shadow-inner" value={payAmount} onChange={e=>setPayAmount(e.target.value)} autoFocus />
                                </div>
                                <div className="flex flex-col gap-4">
                                    <button onClick={payDebt} className="w-full bg-emerald-600 text-white py-8 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl active:scale-95 transition-all">Konfirmasi Bayar</button>
                                    <button onClick={()=>setPayModal(null)} className="w-full py-4 text-slate-300 font-bold uppercase text-[10px] tracking-widest">Batal</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const NavBtn = ({ id, icon, label, active, set }) => (
            <button onClick={() => set(id)} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-black text-sm transition-all duration-300 group ${active === id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-500/50 translate-x-2' : 'text-slate-500 hover:bg-slate-800 hover:text-white'}`}>
                <i data-lucide={icon} className={`w-5 transition-transform group-hover:scale-110 ${active === id ? 'text-white' : 'text-indigo-400'}`}></i> {label}
            </button>
        );

        const MobileNavBtn = ({ id, icon, active, set }) => (
            <button onClick={() => set(id)} className={`p-5 rounded-2xl transition-all duration-500 relative flex items-center justify-center ${active === id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-500/50 -translate-y-6 scale-110' : 'text-slate-400'}`}>
                <i data-lucide={icon} className={`w-6 h-6 ${active === id ? 'stroke-[3]' : 'stroke-2'}`}></i>
                {active === id && <div className="absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full"></div>}
            </button>
        );

        const StatCard = ({ label, val, color, noCurrency, icon }) => (
            <div className={`bg-white p-10 rounded-[3.5rem] border-4 ${color === 'rose' ? 'border-rose-100' : color === 'indigo' ? 'border-indigo-100' : color === 'emerald' ? 'border-emerald-100' : 'border-white'} shadow-xl relative overflow-hidden group hover:shadow-2xl transition-all`}>
                <div className="relative z-10 space-y-6 font-black text-left">
                    <div className={`w-14 h-14 bg-${color}-50 text-${color}-600 rounded-2xl flex items-center justify-center shadow-inner group-hover:rotate-12 transition-transform`}>
                        <i data-lucide={icon || 'bar-chart-3'} className="w-6 h-6"></i>
                    </div>
                    <div>
                        <p className="text-[10px] text-slate-400 uppercase tracking-[0.2em] mb-2 leading-none">{label}</p>
                        <p className={`text-4xl tracking-tighter leading-none ${color === 'emerald' ? 'text-emerald-600' : color === 'indigo' ? 'text-indigo-600' : color === 'rose' ? 'text-rose-500' : 'text-slate-900'}`}>
                            {!noCurrency && CURRENCY + ' '} {(val || 0).toLocaleString()}
                        </p>
                    </div>
                </div>
                <div className="absolute -right-8 -bottom-8 opacity-[0.03] group-hover:scale-110 transition-transform duration-1000">
                    <i data-lucide={icon || 'bar-chart-3'} className="w-48 h-48"></i>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
