<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARUNG ALFEEN - Digital POS & PPOB</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes scanner-line {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
        .animate-scanner-line { 
            position: absolute;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #4F46E5;
            box-shadow: 0 0 15px #4F46E5;
            animation: scanner-line 2s infinite ease-in-out;
            z-index: 10;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .btn-active { transform: scale(0.95); transition: transform 0.1s; }

        /* Optimasi Tampilan Kamera */
        #reader video, #reader-modal video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Menghilangkan elemen teks bawaan html5-qrcode */
        #reader__dashboard_section_swaplink, #reader-modal__dashboard_section_swaplink {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // === CONFIGURATION ===
        const SUPABASE_URL = "https://xhfhmtunsbechgnzgkur.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-P2eIz6XnQ2a4xt4-3ANMQ_7nxWHYfD";
        const APP_NAME = "WARUNG ALFEEN";
        const APP_ADDRESS = "Kp. Cikabodas - Tamanjaya";
        const CURRENCY = "Rp";
        const ADMIN_FEE = 3000;
        const TOKEN_DENOMS = [20000, 50000, 100000, 200000, 500000];

        // Init Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [activeTab, setActiveTab] = useState('cashier');
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isScanningModal, setIsScanningModal] = useState(false);
            const [isFlashOn, setIsFlashOn] = useState(false);
            const [notification, setNotification] = useState(null);
            const [cashReceived, setCashReceived] = useState('');
            const [lastReceipt, setLastReceipt] = useState(null);
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);

            const scannerRef = useRef(null);
            const modalScannerRef = useRef(null);
            const receiptRef = useRef(null);

            const fetchData = async () => {
                try {
                    const { data: p } = await supabase.from('products').select('*').order('name');
                    const { data: s } = await supabase.from('sales').select('*').order('timestamp', { ascending: false });
                    if (p) setInventory(p);
                    if (s) setSales(s || []);
                } catch (e) { console.error("Sync Error", e); }
            };

            // FUNGSI HAPUS PRODUK YANG DIPERBAIKI
            const deleteProduct = async (product) => {
                const isConfirmed = window.confirm(`Apakah Anda yakin ingin menghapus "${product.name}"?`);
                if (isConfirmed) {
                    try {
                        const { error } = await supabase.from('products').delete().eq('id', product.id);
                        if (error) {
                            // Cek jika error karena foreign key (sudah ada di data sales)
                            if (error.code === '23503') {
                                notify("Gagal: Produk ini sudah ada di riwayat penjualan", "error");
                            } else {
                                notify("Gagal menghapus data", "error");
                            }
                        } else {
                            notify("Produk berhasil dihapus");
                            fetchData(); // Refresh data setelah hapus
                        }
                    } catch (e) {
                        notify("Terjadi kesalahan sistem", "error");
                    }
                }
            };

            useEffect(() => { 
                fetchData(); 
                if(window.lucide) window.lucide.createIcons();
            }, []);

            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            }, [activeTab, inventory, isScanning, isScanningModal, lastReceipt, isModalOpen]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const cartTotal = useMemo(() => cart.reduce((s, i) => s + (i.price * i.quantity), 0), [cart]);
            const changeAmount = cashReceived ? Number(cashReceived) - cartTotal : 0;

            const addToCart = (product) => {
                if (product.type !== 'ppob' && product.stock <= 0) return notify("Stok habis!", "error");
                
                setCart(prev => {
                    const exists = prev.find(item => item.id === product.id && item.meterId === product.meterId);
                    if (exists && product.type !== 'ppob') {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
                
                if (isScanning) stopScanner("reader");
                notify(`${product.name} ditambahkan`);
            };

            const updateCartQty = (idx, delta) => {
                const newCart = [...cart];
                const item = newCart[idx];
                const newQty = item.quantity + delta;
                if (newQty <= 0) newCart.splice(idx, 1);
                else {
                    const invItem = inventory.find(i => i.id === item.id);
                    if (delta > 0 && invItem && newQty > invItem.stock && item.type !== 'ppob') {
                        notify("Stok maksimal tercapai", "error");
                        return;
                    }
                    newCart[idx].quantity = newQty;
                }
                setCart(newCart);
            };

            const checkout = async () => {
                if (cart.length === 0 || Number(cashReceived) < cartTotal) return;
                const profit = cart.reduce((sum, item) => {
                    const margin = item.type === 'ppob' ? ADMIN_FEE : (item.price - (item.cost_price || 0));
                    return sum + (margin * item.quantity);
                }, 0);

                const trxId = `TRX-${Date.now()}`;
                const saleData = {
                    id: trxId, items: cart, total: cartTotal, profit: profit,
                    payment: Number(cashReceived), change_amount: changeAmount,
                    timestamp: new Date().toISOString()
                };

                const { error } = await supabase.from('sales').insert([saleData]);
                if (!error) {
                    for (const item of cart) {
                        if (item.type !== 'ppob') {
                            await supabase.from('products').update({ stock: item.stock - item.quantity }).eq('id', item.id);
                        }
                    }
                    setLastReceipt(saleData);
                    setCart([]); setCashReceived(''); fetchData();
                    notify("Transaksi Berhasil!");
                }
            };

            // Logika Scanner yang Disempurnakan (Sama untuk Kasir & Stok)
            const startScanner = async (target = "reader") => {
                const isMain = target === "reader";
                if(isMain) setIsScanning(true); else setIsScanningModal(true);

                // Delay kecil untuk memastikan elemen DOM siap
                setTimeout(async () => {
                    const html5QrCode = new window.Html5Qrcode(target);
                    if(isMain) scannerRef.current = html5QrCode; else modalScannerRef.current = html5QrCode;

                    // Konfigurasi khusus untuk Barcode (Persegi Panjang)
                    const config = {
                        fps: 30, // FPS lebih tinggi agar responsif
                        qrbox: (viewfinderWidth, viewfinderHeight) => {
                            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                            const qrboxWidth = Math.floor(viewfinderWidth * 0.8);
                            const qrboxHeight = Math.floor(qrboxWidth * 0.45); // Rasio Barcode
                            return { width: qrboxWidth, height: qrboxHeight };
                        },
                        aspectRatio: 1.0 // Rasio kotak untuk container luar
                    };

                    try {
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            config,
                            (decodedText) => {
                                if(isMain) {
                                    const product = inventory.find(i => i.barcode === decodedText);
                                    if (product) {
                                        // MEMATIKAN KAMERA SETELAH BERHASIL SCAN
                                        stopScanner("reader"); 
                                        addToCart(product);
                                        if(navigator.vibrate) navigator.vibrate(80);
                                    } else notify("Produk tidak dikenal", "error");
                                } else {
                                    // Untuk Modal Stok
                                    const input = document.getElementById('product_barcode');
                                    if(input) input.value = decodedText;
                                    stopScanner("reader-modal");
                                    notify("Barcode OK!");
                                    if(navigator.vibrate) navigator.vibrate(50);
                                }
                            }
                        );
                    } catch (err) { 
                        console.error(err); 
                        if(isMain) setIsScanning(false); else setIsScanningModal(false);
                    }
                }, 400);
            };

            const stopScanner = async (target = "reader") => {
                const isMain = target === "reader";
                const ref = isMain ? scannerRef : modalScannerRef;
                if (ref.current) {
                    try {
                        await ref.current.stop();
                        ref.current = null;
                    } catch (e) { console.warn(e); }
                }
                if(isMain) setIsScanning(false); else setIsScanningModal(false);
                setIsFlashOn(false);
            };

            const toggleFlash = async (target = "reader") => {
                const ref = target === "reader" ? scannerRef : modalScannerRef;
                if (ref.current) {
                    const next = !isFlashOn;
                    try {
                        await ref.current.applyVideoConstraints({ advanced: [{ torch: next }] });
                        setIsFlashOn(next);
                    } catch (e) { notify("Flash tidak didukung", "error"); }
                }
            };

            const analyzeAI = async () => {
                setIsAiLoading(true);
                try {
                    const stats = {
                        omzet: sales.reduce((a, b) => a + (b.total || 0), 0),
                        laba: sales.reduce((a, b) => a + (b.profit || 0), 0),
                        transaksi: sales.length,
                        stok_rendah: inventory.filter(i => i.stock < 5).map(i => i.name)
                    };
                    const prompt = `Analisis data Warung Alfeen: Omzet Rp${stats.omzet}, Laba Rp${stats.laba}, ${stats.transaksi} transaksi. Stok menipis: ${stats.stok_rendah.join(", ") || 'Aman'}. Berikan 3 saran strategi bisnis singkat.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const resData = await response.json();
                    setAiAnalysis(resData.candidates[0].content.parts[0].text);
                } catch (e) { setAiAnalysis("AI sedang sibuk."); }
                finally { setIsAiLoading(false); }
            };

            const downloadReceipt = () => {
                window.html2canvas(receiptRef.current, { scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Alfeen_${lastReceipt.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                    notify("Gambar Struk Tersimpan!");
                });
            };

            return (
                <div className="min-h-screen pb-24 lg:pb-0 lg:pl-64 flex flex-col">
                    
                    {/* Desktop Sidebar */}
                    <aside className="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-slate-900 text-white flex-col p-6 z-50">
                        <div className="mb-10">
                            <h1 className="text-2xl font-black tracking-tighter text-indigo-400 italic">ALFEEN STORE</h1>
                            <p className="text-[10px] font-bold text-slate-500 uppercase">Cloud Digital POS</p>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <NavBtn id="cashier" icon="layout-dashboard" label="Mesin Kasir" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ppob" icon="zap" label="Listrik & Token" active={activeTab} set={setActiveTab} />
                            <NavBtn id="inventory" icon="package" label="Gudang Stok" active={activeTab} set={setActiveTab} />
                            <NavBtn id="history" icon="history" label="Rekap Penjualan" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ai" icon="brain-circuit" label="Asisten AI" active={activeTab} set={setActiveTab} />
                        </nav>
                    </aside>

                    {/* Mobile Navigation */}
                    <nav className="lg:hidden fixed bottom-0 left-0 w-full glass-nav z-[100] px-4 py-3 flex justify-around items-center">
                        <MobileNavBtn id="cashier" icon="layout-dashboard" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ppob" icon="zap" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="inventory" icon="package" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="history" icon="history" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ai" icon="brain-circuit" active={activeTab} set={setActiveTab} />
                    </nav>

                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm bg-slate-900 text-white flex items-center gap-2 animate-in slide-in-from-top-4 border border-white/10">
                            <div className={`w-2 h-2 rounded-full ${notification.type === 'error' ? 'bg-rose-500 shadow-[0_0_10px_red]' : 'bg-emerald-400 shadow-[0_0_10px_#4ade80]'}`}></div>
                            {notification.msg}
                        </div>
                    )}

                    <main className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {/* Tab Content: KASIR */}
                        {activeTab === 'cashier' && (
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                <div className="xl:col-span-2 space-y-6">
                                    <div className="flex gap-3">
                                        <div className="relative flex-1 group">
                                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 transition-colors group-focus-within:text-indigo-500"></i>
                                            <input type="text" placeholder="Cari nama barang..." className="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border shadow-sm outline-none focus:ring-2 ring-indigo-500 font-semibold" onChange={e => setSearchTerm(e.target.value)} />
                                        </div>
                                        <button onClick={() => isScanning ? stopScanner("reader") : startScanner("reader")} className={`px-6 rounded-2xl font-bold flex items-center gap-2 shadow-lg transition-all active:scale-95 ${isScanning ? 'bg-rose-500 text-white shadow-rose-200' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                                            <i data-lucide={isScanning ? "x" : "camera"}></i>
                                            <span className="hidden md:inline">{isScanning ? 'Batal' : 'Scan'}</span>
                                        </button>
                                    </div>

                                    {isScanning && (
                                        <div className="relative aspect-video max-w-lg mx-auto rounded-3xl overflow-hidden bg-black border-[6px] border-white shadow-2xl animate-in zoom-in-95">
                                            <div id="reader" className="w-full h-full"></div>
                                            <div className="animate-scanner-line"></div>
                                            <button onClick={() => toggleFlash("reader")} className="absolute top-4 right-4 z-20 p-3 bg-black/40 backdrop-blur-md text-white rounded-full border border-white/20 hover:bg-black/60 transition-colors">
                                                <i data-lucide="zap" className={isFlashOn ? 'text-yellow-400' : ''}></i>
                                            </button>
                                            {/* Masking overlay for focus */}
                                            <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
                                                <div className="w-[85%] h-[45%] border-2 border-indigo-400/40 rounded-2xl bg-white/5"></div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {inventory.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <button key={p.id} onClick={() => addToCart(p)} className="bg-white p-5 rounded-3xl border-2 border-transparent hover:border-indigo-500 shadow-sm hover:shadow-xl transition-all text-left flex flex-col h-full group active:scale-95 relative overflow-hidden">
                                                <div className="absolute top-0 right-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="plus-circle" className="text-indigo-500 w-5"></i></div>
                                                <span className="text-[10px] font-black uppercase text-indigo-500 bg-indigo-50 px-2.5 py-1 rounded-lg w-fit mb-3">{p.category}</span>
                                                <h3 className="font-bold text-sm text-slate-800 flex-1 leading-tight mb-2">{p.name}</h3>
                                                <div className="mt-auto flex justify-between items-end">
                                                    <p className="text-lg font-black text-slate-900">{CURRENCY} {p.price.toLocaleString()}</p>
                                                    <p className={`text-[10px] font-bold ${p.stock < 10 ? 'text-rose-500' : 'text-slate-400'}`}>Sisa {p.stock}</p>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Keranjang Samping */}
                                <div className="bg-white rounded-[2.5rem] border-4 border-white shadow-2xl flex flex-col h-fit sticky top-8 overflow-hidden">
                                    <div className="p-6 border-b bg-slate-50/50 flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="shopping-cart" className="w-5 text-indigo-600"></i>
                                            <h2 className="font-black text-lg uppercase tracking-tight">Keranjang</h2>
                                        </div>
                                        <button onClick={() => setCart([])} className="text-[10px] font-black text-rose-400 hover:text-rose-600 uppercase tracking-widest">Hapus Semua</button>
                                    </div>
                                    <div className="p-6 space-y-4 max-h-[45vh] overflow-y-auto custom-scrollbar">
                                        {cart.length === 0 ? (
                                            <div className="py-16 text-center space-y-3 opacity-20">
                                                <i data-lucide="shopping-bag" className="w-12 h-12 mx-auto"></i>
                                                <p className="text-[10px] font-black uppercase tracking-[0.2em]">Belum Ada Barang</p>
                                            </div>
                                        ) : cart.map((it, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-white hover:bg-white hover:shadow-md transition-all">
                                                <div className="flex-1 pr-4">
                                                    <p className="text-xs font-black text-slate-800 line-clamp-1">{it.name}</p>
                                                    <div className="flex items-center gap-3 mt-2">
                                                        <button onClick={() => updateCartQty(idx, -1)} className="w-8 h-8 bg-white rounded-xl border border-slate-100 flex items-center justify-center hover:text-rose-500 transition-colors shadow-sm">-</button>
                                                        <span className="text-xs font-black w-4 text-center">{it.quantity}</span>
                                                        <button onClick={() => updateCartQty(idx, 1)} className="w-8 h-8 bg-white rounded-xl border border-slate-100 flex items-center justify-center hover:text-indigo-600 shadow-sm transition-colors">+</button>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-indigo-600 text-sm">{(it.price * it.quantity).toLocaleString()}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-8 bg-slate-50 border-t space-y-5">
                                        <div className="flex justify-between items-end">
                                            <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Total Tagihan</span>
                                            <span className="text-4xl font-black text-slate-900 tracking-tighter leading-none">{CURRENCY} {cartTotal.toLocaleString()}</span>
                                        </div>
                                        {cart.length > 0 && (
                                            <div className="space-y-4 pt-2">
                                                <div className="relative">
                                                    <i data-lucide="banknote" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5"></i>
                                                    <input type="number" placeholder="Nominal Bayar..." className="w-full pl-12 pr-6 py-5 bg-white rounded-2xl font-black text-center text-2xl text-indigo-600 shadow-sm outline-none border-2 border-transparent focus:border-indigo-100" value={cashReceived} onChange={e => setCashReceived(e.target.value)} />
                                                </div>
                                                <div className="flex justify-between items-center px-2">
                                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Kembalian</span>
                                                    <span className={`text-2xl font-black ${changeAmount < 0 ? 'text-rose-500' : 'text-emerald-600'}`}>{CURRENCY} {changeAmount.toLocaleString()}</span>
                                                </div>
                                            </div>
                                        )}
                                        <button onClick={checkout} disabled={cart.length === 0 || !cashReceived || changeAmount < 0} className="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black shadow-2xl shadow-indigo-100 disabled:bg-slate-200 disabled:shadow-none uppercase tracking-[0.2em] text-xs flex items-center justify-center gap-3 active:scale-95 transition-all">
                                            Proses Bayar Cloud
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab Content: PPOB */}
                        {activeTab === 'ppob' && (
                            <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                                <div className="text-center py-6">
                                    <h2 className="text-4xl font-black text-slate-950 uppercase tracking-tighter">Listrik & Token</h2>
                                    <p className="text-slate-400 font-bold text-sm tracking-[0.3em] mt-2">ADMIN FEE RP3.000</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6">
                                        <div className="flex items-center gap-3 border-b pb-4 border-slate-50">
                                            <i data-lucide="zap" className="text-indigo-600 w-6"></i>
                                            <h3 className="font-black uppercase tracking-tight">Token Listrik</h3>
                                        </div>
                                        <div className="space-y-4">
                                            <input id="tkn_meter" type="text" placeholder="No. Meter Pelanggan..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-indigo-700 border-2 border-transparent focus:border-indigo-100" />
                                            <div className="grid grid-cols-3 gap-3">
                                                {TOKEN_DENOMS.map(d => (
                                                    <button key={d} onClick={() => {
                                                        const m = document.getElementById('tkn_meter').value;
                                                        if(!m) return notify("Isi No Meter!", "error");
                                                        addToCart({ id: `TKN-${d}`, name: `TOKEN PLN ${d/1000}K`, price: d + ADMIN_FEE, type: 'ppob', meterId: m, quantity: 1 });

                <div className="relative z-10 space-y-4">
                    <div className={`w-12 h-12 bg-${color}-50 text-${color}-600 rounded-2xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform`}>
                        <i data-lucide={label === 'Transaksi' ? 'shopping-bag' : 'trending-up'} className="w-6 h-6"></i>
                    </div>
                    <div>
                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-1">{label}</p>
                        <p className={`text-4xl font-black tracking-tighter leading-none ${color === 'emerald' ? 'text-emerald-600' : 'text-slate-900'}`}>
                            {!noCurrency && CURRENCY + ' '} {val.toLocaleString()}
                        </p>
                    </div>
                </div>
                <div className="absolute -right-8 -bottom-8 opacity-5 text-slate-900 group-hover:rotate-12 transition-transform duration-1000">
                    <i data-lucide="bar-chart-3" className="w-40 h-40"></i>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
