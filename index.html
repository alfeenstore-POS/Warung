<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARUNG ALFEEN - Cloud POS & Piutang</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        @keyframes scanner-line { 0% { top: 10%; opacity: 0; } 50% { opacity: 1; } 100% { top: 90%; opacity: 0; } }
        .animate-scanner-line { position: absolute; left: 5%; width: 90%; height: 2px; background: #4F46E5; box-shadow: 0 0 15px #4F46E5; animation: scanner-line 2s infinite ease-in-out; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.1); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #reader video, #reader-modal video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #reader__dashboard_section_swaplink, #reader-modal__dashboard_section_swaplink { display: none !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const SUPABASE_URL = "https://xhfhmtunsbechgnzgkur.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-P2eIz6XnQ2a4xt4-3ANMQ_7nxWHYfD";
        const APP_NAME = "WARUNG ALFEEN";
        const APP_ADDRESS = "Kp. Cikabodas - Tamanjaya";
        const ADMIN_FEE = 3000;
        const CURRENCY = "Rp";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [activeTab, setActiveTab] = useState('cashier');
            const [inventory, setInventory] = useState([]);
            const [sales, setSales] = useState([]);
            const [debtors, setDebtors] = useState([]);
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isScanningModal, setIsScanningModal] = useState(false);
            const [isFlashOn, setIsFlashOn] = useState(false);
            const [notification, setNotification] = useState(null);
            const [cashReceived, setCashReceived] = useState('');
            const [discount, setDiscount] = useState('');
            const [lastReceipt, setLastReceipt] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [debtorModal, setDebtorModal] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);

            const scannerRef = useRef(null);
            const modalScannerRef = useRef(null);
            const receiptRef = useRef(null);

            const fetchData = async () => {
                const { data: p } = await supabase.from('products').select('*').order('name');
                const { data: s } = await supabase.from('sales').select('*').order('timestamp', { ascending: false });
                const { data: d } = await supabase.from('debtors').select('*').order('total_debt', { ascending: false });
                if (p) setInventory(p);
                if (s) setSales(s || []);
                if (d) setDebtors(d || []);
            };

            useEffect(() => { fetchData(); }, []);
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [activeTab, inventory, isScanning, isScanningModal, debtors, sales, lastReceipt]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const subtotal = useMemo(() => cart.reduce((s, i) => s + (i.price * i.quantity), 0), [cart]);
            const cartTotal = useMemo(() => Math.max(0, subtotal - (Number(discount) || 0)), [subtotal, discount]);
            const changeAmount = cashReceived ? Number(cashReceived) - cartTotal : 0;

            const stats = useMemo(() => {
                const today = new Date().toLocaleDateString('en-CA');
                const totals = sales.reduce((acc, s) => {
                    const sDate = new Date(s.timestamp).toLocaleDateString('en-CA');
                    const total = Number(s.total) || 0;
                    const profit = Number(s.profit) || 0;
                    // Pastikan is_debt dibaca sebagai boolean murni
                    const isDebt = s.is_debt === true || s.is_debt === 'true';
                    
                    acc.totalRevenue += total;
                    acc.totalProfit += profit;

                    if (sDate === today) {
                        acc.todayRevenue += total;
                        acc.todayProfit += profit;
                        if (isDebt) {
                            acc.todayDebt += total;
                        } else {
                            acc.todayCash += total;
                        }
                    }
                    return acc;
                }, { 
                    todayRevenue: 0, todayProfit: 0, todayDebt: 0, todayCash: 0,
                    totalRevenue: 0, totalProfit: 0 
                });

                // Hitung total piutang dari database debtors secara akurat
                const totalPiutangRil = debtors.reduce((sum, d) => sum + (Number(d.total_debt) || 0), 0);
                
                return { ...totals, totalPiutang: totalPiutangRil, totalTransactions: sales.length };
            }, [sales, debtors]);

            const updateCartQty = (idx, delta) => {
                const newCart = [...cart];
                const item = newCart[idx];
                const newQty = item.quantity + delta;
                if (newQty <= 0) newCart.splice(idx, 1);
                else {
                    const invP = inventory.find(i => i.id === item.id);
                    if(delta > 0 && invP && newQty > invP.stock && item.type !== 'ppob') return notify("Stok limit", "error");
                    newCart[idx].quantity = newQty;
                }
                setCart(newCart);
            };

            const addToCart = (p) => {
                if (p.type !== 'ppob' && p.stock <= 0) return notify("Stok habis!", "error");
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id && item.meterId === p.meterId);
                    if (exists && p.type !== 'ppob') {
                        return prev.map(item => item.id === p.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...p, quantity: 1 }];
                });
            };

            const checkout = async (isDebt = false, debtorId = null) => {
                if (cart.length === 0) return;
                if (!isDebt && (!cashReceived || changeAmount < 0)) return notify("Lengkapi pembayaran!", "error");
                
                try {
                    notify("Menyimpan ke Cloud...", "success");
                    const totalMargin = cart.reduce((sum, item) => {
                        const margin = item.type === 'ppob' ? ADMIN_FEE : (item.price - (item.cost_price || 0));
                        return sum + (margin * item.quantity);
                    }, 0);
                    const finalProfit = totalMargin - (Number(discount) || 0);
                    const trxId = `TRX-${Date.now()}`;

                    const saleData = {
                        id: trxId, items: cart, total: Number(cartTotal), profit: Number(finalProfit),
                        discount: Number(discount) || 0, subtotal: Number(subtotal),
                        payment: isDebt ? 0 : Number(cashReceived), change_amount: isDebt ? 0 : Number(changeAmount),
                        is_debt: isDebt, debtor_id: debtorId, timestamp: new Date().toISOString()
                    };

                    const { error: saleErr } = await supabase.from('sales').insert([saleData]);
                    if (saleErr) throw saleErr;

                    for (const item of cart) {
                        if (item.type !== 'ppob') {
                            await supabase.from('products').update({ stock: item.stock - item.quantity }).eq('id', item.id);
                        }
                    }

                    if (isDebt && debtorId) {
                        const debtor = debtors.find(d => d.id === debtorId);
                        const newTotalDebt = (Number(debtor.total_debt) || 0) + cartTotal;
                        await supabase.from('debtors').update({ total_debt: newTotalDebt }).eq('id', debtorId);
                        await supabase.from('debt_history').insert([{ debtor_id: debtorId, amount: cartTotal, description: `Belanja: ${trxId}` }]);
                    }

                    setLastReceipt(saleData);
                    setCart([]); setCashReceived(''); setDiscount(''); setDebtorModal(false);
                    fetchData();
                    notify(isDebt ? "Hutang dicatat!" : "Transaksi Berhasil!");
                } catch (err) { notify("Error: " + err.message, "error"); }
            };

            const startScanner = async (target = "reader") => {
                const isMain = target === "reader";
                isMain ? setIsScanning(true) : setIsScanningModal(true);
                setTimeout(async () => {
                    const html5QrCode = new window.Html5Qrcode(target);
                    isMain ? scannerRef.current = html5QrCode : modalScannerRef.current = html5QrCode;
                    try {
                        await html5QrCode.start({ facingMode: "environment" }, {
                            fps: 30, qrbox: (w, h) => {
                                const boxW = w * 0.8;
                                return { width: boxW, height: boxW * 0.45 };
                            }
                        }, (decodedText) => {
                            if(navigator.vibrate) navigator.vibrate(80);
                            if(isMain) {
                                const p = inventory.find(i => i.barcode === decodedText);
                                if (p) { addToCart(p); stopScanner("reader"); }
                                else notify("Barang tidak ada", "error");
                            } else {
                                const input = document.getElementById('product_barcode');
                                if(input) input.value = decodedText;
                                stopScanner("reader-modal");
                            }
                        });
                    } catch (err) { isMain ? setIsScanning(false) : setIsScanningModal(false); }
                }, 400);
            };

            const stopScanner = async (target = "reader") => {
                const isMain = target === "reader";
                const ref = isMain ? scannerRef : modalScannerRef;
                if (ref.current) { try { await ref.current.stop(); ref.current = null; } catch (e) {} }
                isMain ? setIsScanning(false) : setIsScanningModal(false);
                setIsFlashOn(false);
            };

            const toggleFlash = async (target = "reader") => {
                const ref = target === "reader" ? scannerRef : modalScannerRef;
                if (ref.current && ref.current.isScanning) {
                    const next = !isFlashOn;
                    try { await ref.current.applyVideoConstraints({ advanced: [{ torch: next }] }); setIsFlashOn(next); } catch (e) { notify("Flash tidak didukung", "error"); }
                }
            };

            const runAI = async () => {
                setIsAiLoading(true);
                try {
                    const low = inventory.filter(i => i.stock < 10).map(i => i.name).join(", ");
                    const prompt = `Analisis Warung Alfeen: Hari ini Omzet Rp${stats.todayRevenue}, Laba Rp${stats.todayProfit}. Total Piutang Pelanggan: Rp${stats.totalPiutang}. Produk stok rendah: ${low || 'Semua aman'}. Berikan 3 saran strategi bisnis singkat.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const resData = await response.json();
                    setAiAnalysis(resData.candidates[0].content.parts[0].text);
                } catch (e) { setAiAnalysis("AI sedang istirahat."); }
                finally { setIsAiLoading(false); }
            };

            const downloadReceipt = () => {
                window.html2canvas(receiptRef.current, { scale: 3 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Alfeen_${lastReceipt.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                });
            };

            return (
                <div className="min-h-screen pb-24 lg:pb-0 lg:pl-64 flex flex-col">
                    <aside className="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-slate-900 text-white flex-col p-6 z-50 shadow-2xl">
                        <div className="mb-10"><h1 className="text-2xl font-black text-indigo-400 italic uppercase tracking-tighter">Alfeen POS</h1></div>
                        <nav className="space-y-2 flex-1">
                            <NavBtn id="cashier" icon="layout-dashboard" label="Kasir" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ppob" icon="zap" label="Token & Listrik" active={activeTab} set={setActiveTab} />
                            <NavBtn id="inventory" icon="package" label="Gudang Stok" active={activeTab} set={setActiveTab} />
                            <NavBtn id="piutang" icon="users" label="Piutang" active={activeTab} set={setActiveTab} />
                            <NavBtn id="history" icon="history" label="Rekap" active={activeTab} set={setActiveTab} />
                            <NavBtn id="ai" icon="brain-circuit" label="Asisten AI" active={activeTab} set={setActiveTab} />
                        </nav>
                    </aside>

                    {/* Navigasi Mobile */}
                    <nav className="lg:hidden fixed bottom-0 left-0 w-full glass-nav z-[100] px-4 py-3 flex justify-around items-center rounded-t-3xl shadow-2xl">
                        <MobileNavBtn id="cashier" icon="layout-dashboard" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ppob" icon="zap" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="inventory" icon="package" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="piutang" icon="users" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="history" icon="history" active={activeTab} set={setActiveTab} />
                        <MobileNavBtn id="ai" icon="brain-circuit" active={activeTab} set={setActiveTab} />
                    </nav>

                    <main className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {/* Tab: KASIR */}
                        {activeTab === 'cashier' && (
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                <div className="xl:col-span-2 space-y-6">
                                    <div className="flex gap-3">
                                        <div className="relative flex-1">
                                            <input type="text" placeholder="Cari..." className="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border shadow-sm outline-none font-bold" onChange={e => setSearchTerm(e.target.value)} />
                                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 w-5"></i>
                                        </div>
                                        <button onClick={() => isScanning ? stopScanner("reader") : startScanner("reader")} className={`px-6 rounded-2xl font-bold flex items-center shadow-lg transition-all ${isScanning ? 'bg-rose-500 text-white' : 'bg-indigo-600 text-white'}`}>
                                            <i data-lucide={isScanning ? "x" : "camera"}></i>
                                        </button>
                                    </div>
                                    {isScanning && (
                                        <div className="relative aspect-video rounded-3xl overflow-hidden bg-black border-4 border-white shadow-2xl">
                                            <div id="reader" className="w-full h-full"></div>
                                            <div className="animate-scanner-line"></div>
                                            <button onClick={() => toggleFlash("reader")} className="absolute top-4 right-4 z-20 p-4 bg-black/40 text-white rounded-full"><i data-lucide="zap" className={isFlashOn ? 'text-yellow-400' : ''}></i></button>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {inventory.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                            <button key={p.id} onClick={() => addToCart(p)} className="bg-white p-4 rounded-3xl border shadow-sm hover:shadow-xl active:scale-95 text-left flex flex-col h-full group">
                                                <h3 className="font-bold text-sm text-slate-800 flex-1 leading-tight">{p.name}</h3>
                                                <p className="text-lg font-black text-indigo-600 mt-2">{CURRENCY} {p.price.toLocaleString()}</p>
                                                <p className="text-[10px] text-slate-400">Sisa {p.stock}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border shadow-2xl flex flex-col h-fit sticky top-8 overflow-hidden">
                                    <div className="p-6 border-b bg-slate-50 font-black text-lg flex justify-between"><h2>PESANAN</h2><button onClick={()=>setCart([])} className="text-rose-400 text-xs">HAPUS</button></div>
                                    <div className="p-6 space-y-4 max-h-[40vh] overflow-y-auto custom-scrollbar">
                                        {cart.map((it, idx) => (
                                            <div key={idx} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl border border-white">
                                                <div className="flex-1 pr-4"><p className="text-xs font-black leading-tight">{it.name}</p>
                                                <div className="flex items-center gap-3 mt-1">
                                                    <button onClick={() => updateCartQty(idx, -1)} className="w-7 h-7 bg-white rounded-lg shadow-sm border">-</button>
                                                    <span className="text-xs font-black">{it.quantity}</span>
                                                    <button onClick={() => updateCartQty(idx, 1)} className="w-7 h-7 bg-white rounded-lg shadow-sm border">+</button>
                                                </div></div>
                                                <p className="font-black text-indigo-600 text-sm">{(it.price * it.quantity).toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-8 bg-slate-50 border-t space-y-4">
                                        <div className="flex justify-between px-2 text-[10px] font-black text-slate-400"><span>SUBTOTAL</span><span>Rp {subtotal.toLocaleString()}</span></div>
                                        <input type="number" placeholder="Diskon (Rp)..." className="w-full p-3 bg-white rounded-xl font-bold text-rose-500 shadow-inner border border-rose-50" value={discount} onChange={e => setDiscount(e.target.value)} />
                                        <div className="flex justify-between items-end border-t pt-2">
                                            <span className="text-[11px] font-black text-indigo-500 uppercase">Total</span>
                                            <span className="text-4xl font-black text-slate-900">Rp {cartTotal.toLocaleString()}</span>
                                        </div>
                                        <input type="number" placeholder="Bayar Tunai..." className="w-full p-4 bg-white rounded-2xl font-black text-center text-3xl text-indigo-600 shadow-sm border-2 border-transparent focus:border-indigo-100" value={cashReceived} onChange={e => setCashReceived(e.target.value)} />
                                        <div className="flex justify-between px-2 font-black"><span className="text-[10px] text-slate-400 uppercase">Kembalian</span><span className={`text-xl ${changeAmount < 0 ? 'text-rose-500' : 'text-emerald-600'}`}>Rp {changeAmount.toLocaleString()}</span></div>
                                        <div className="grid grid-cols-2 gap-3 pt-4">
                                            <button onClick={() => setDebtorModal(true)} disabled={cart.length === 0} className="bg-slate-900 text-white py-4 rounded-2xl font-black text-xs">HUTANG</button>
                                            <button onClick={() => checkout(false)} disabled={cart.length === 0 || !cashReceived || changeAmount < 0} className="bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs shadow-xl">BAYAR CASH</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ppob' && (
                             <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                                <div className="text-center py-6"><h2 className="text-4xl font-black uppercase italic">Token & Tagihan</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6">
                                        <h3 className="font-black uppercase italic text-indigo-600">Token Listrik</h3>
                                        <input id="tkn_meter" type="text" placeholder="No. Meter..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-indigo-700 text-center text-xl" />
                                        <div className="grid grid-cols-3 gap-3">
                                            {[20000, 50000, 100000, 200000, 500000, 1000000].map(d => (
                                                <button key={d} onClick={() => {
                                                    const m = document.getElementById('tkn_meter').value;
                                                    if(!m) return notify("Isi No Meter!", "error");
                                                    addToCart({ id: `TKN-${d}`, name: `TOKEN PLN ${d/1000}K`, price: d + ADMIN_FEE, type: 'ppob', meterId: m, quantity: 1 });
                                                }} className="py-4 bg-indigo-50 text-indigo-600 rounded-2xl font-black hover:bg-indigo-600 hover:text-white transition-all text-xs">{d/1000}K</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3.5rem] border-4 border-white shadow-xl space-y-6 flex flex-col">
                                        <h3 className="font-black uppercase italic text-emerald-600">Tagihan PLN</h3>
                                        <input id="bil_meter" type="text" placeholder="ID Pelanggan..." className="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-emerald-700 text-center text-xl" />
                                        <input id="bil_amount" type="number" placeholder="Nominal..." className="w-full p-5 bg-slate-50 rounded-2xl font-black text-emerald-600 text-center text-3xl" />
                                        <button onClick={() => {
                                            const m = document.getElementById('bil_meter').value;
                                            const v = Number(document.getElementById('bil_amount').value);
                                            if(!m || !v) return notify("Lengkapi data!", "error");
                                            addToCart({ id: `BIL-${Date.now()}`, name: `TAGIHAN PLN`, price: v + ADMIN_FEE, type: 'ppob', meterId: m, quantity: 1 });
                                        }} className="w-full bg-emerald-600 text-white py-6 rounded-2xl font-black shadow-lg uppercase text-xs mt-auto">Tambahkan</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && <InventoryView inventory={inventory} supabase={supabase} refresh={fetchData} notify={notify} startScanner={startScanner} stopScanner={stopScanner} isScanningModal={isScanningModal} isFlashOn={isFlashOn} toggleFlash={toggleFlash} setIsModalOpen={setIsModalOpen} isModalOpen={isModalOpen} editingItem={editingItem} setEditingItem={setEditingItem} />}
                        
                        {activeTab === 'piutang' && <PiutangView debtors={debtors} stats={stats} supabase={supabase} refresh={fetchData} notify={notify} />}
                        
                        {activeTab === 'history' && (
                            <div className="space-y-10 animate-in fade-in max-w-6xl mx-auto">
                                <div className="space-y-6">
                                    <div className="flex items-center gap-3 px-2">
                                        <div className="w-2 h-8 bg-indigo-600 rounded-full"></div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-tighter">Rekap Keuangan</h2>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <StatCard label="Total Omzet (Hari Ini)" val={stats.todayRevenue} color="indigo" icon="calendar" />
                                        <StatCard label="Uang Tunai Ril (Hari Ini)" val={stats.todayCash} color="emerald" icon="banknote" />
                                        <StatCard label="Piutang Baru (Hari Ini)" val={stats.todayDebt} color="rose" icon="user-minus" />
                                        <StatCard label="Laba Bersih (Hari Ini)" val={stats.todayProfit} color="indigo" icon="trending-up" />
                                    </div>

                                    <div className="flex items-center gap-4 py-4">
                                        <div className="flex-1 h-px bg-slate-200"></div>
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Akumulasi Seluruh Waktu</span>
                                        <div className="flex-1 h-px bg-slate-200"></div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 opacity-80 scale-95 origin-top hover:scale-100 hover:opacity-100 transition-all">
                                        <StatCard label="Total Omzet Toko" val={stats.totalRevenue} color="slate" icon="bar-chart-3" />
                                        <StatCard label="Total Laba Toko" val={stats.totalProfit} color="slate" icon="pie-chart" />

        function PiutangView({ debtors, stats, supabase, refresh, notify }) {
            const [showModal, setShowModal] = useState(false);

            const [payAmount, setPayAmount] = useState('');

            const addDebtor = async (e) => {
                e.preventDefault();
                const { error } = await supabase.from('debtors').insert([{ name: newName, phone: newPhone, total_debt: 0 }]);
                if (!error) { setShowModal(false); setNewName(''); setNewPhone(''); refresh(); notify("Pelanggan Ditambah"); }
            };

            const payDebt = async () => {
                const amount = Number(payAmount);
                if (!amount || amount <= 0) return;
                const { error: histErr } = await supabase.from('debt_history').insert([{ debtor_id: payModal.id, amount: -amount, description: "Bayar Cicilan" }]);
                if (!histErr) {
                    await supabase.from('debtors').update({ total_debt: Number(payModal.total_debt) - amount }).eq('id', payModal.id);
                    setPayModal(null); setPayAmount(''); refresh(); notify("Pembayaran Dicatat");
                }
            };

                <div className="space-y-10 animate-in fade-in max-w-6xl mx-auto">

                                    <span className="text-3xl font-black text-rose-500 tracking-tighter">Rp {(d.total_debt || 0).toLocaleString()}</span>
                                </div>
                                <button onClick={() => setPayModal(d)} disabled={d.total_debt <= 0} className="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100 active:scale-95 disabled:opacity-30 transition-all">BAYAR / CICIL</button>
                            </div>
                        ))}

                                <div className="text-center">
                                    <h3 className="text-2xl font-black uppercase italic">Bayar Hutang</h3>
                                    <p className="font-bold text-slate-400 mt-1 uppercase text-[10px] tracking-widest">Pelanggan: <span className="text-indigo-600">{payModal.name}</span></p>
                                </div>
                                <div className="relative">
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-slate-200 text-3xl">Rp</span>
                                    <input type="number" placeholder="0" className="w-full pl-16 pr-8 py-8 bg-slate-50 border-4 border-emerald-50 rounded-[2rem] font-black text-5xl text-emerald-600 text-center outline-none shadow-inner" value={payAmount} onChange={e=>setPayAmount(e.target.value)} autoFocus />
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button onClick={payDebt} className="w-full bg-emerald-600 text-white py-7 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl active:scale-95 transition-all">Konfirmasi Bayar</button>
                                    <button onClick={()=>setPayModal(null)} className="w-full py-4 text-slate-300 font-bold uppercase text-[10px] tracking-widest">Batal</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const NavBtn = ({ id, icon, label, active, set }) => (
            <button onClick={() => set(id)} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-black text-sm transition-all duration-300 group ${active === id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-500/50 translate-x-2' : 'text-slate-500 hover:bg-slate-800 hover:text-white'}`}>
                <i data-lucide={icon} className={`w-5 transition-transform group-hover:scale-110 ${active === id ? 'text-white' : 'text-indigo-400'}`}></i> {label}
            </button>
        );

        const MobileNavBtn = ({ id, icon, active, set }) => (
            <button onClick={() => set(id)} className={`p-5 rounded-2xl transition-all duration-500 relative flex items-center justify-center ${active === id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-500/50 -translate-y-6 scale-110' : 'text-slate-400'}`}>
                <i data-lucide={icon} className={`w-6 h-6 ${active === id ? 'stroke-[3]' : 'stroke-2'}`}></i>
                {active === id && <div className="absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full"></div>}
            </button>
        );

        const StatCard = ({ label, val, color, noCurrency, icon }) => (
            <div className={`bg-white p-10 rounded-[3.5rem] border-4 ${color === 'rose' ? 'border-rose-100' : color === 'indigo' ? 'border-indigo-100' : color === 'emerald' ? 'border-emerald-100' : 'border-white'} shadow-xl relative overflow-hidden group hover:shadow-2xl transition-all`}>
                <div className="relative z-10 space-y-5 font-black">
                    <div className={`w-12 h-12 bg-${color}-50 text-${color}-600 rounded-2xl flex items-center justify-center shadow-inner group-hover:rotate-12 transition-transform`}>
                        <i data-lucide={icon || 'trending-up'} className="w-6 h-6"></i>
                    </div>
                    <div>
                        <p className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                        <p className={`text-3xl tracking-tighter ${color === 'emerald' ? 'text-emerald-600' : color === 'indigo' ? 'text-indigo-600' : color === 'rose' ? 'text-rose-500' : 'text-slate-900'}`}>
                            {!noCurrency && CURRENCY + ' '} {(val || 0).toLocaleString()}
                        </p>
                    </div>
                </div>
                <div className="absolute -right-8 -bottom-8 opacity-[0.03] group-hover:scale-110 transition-transform duration-1000">
                    <i data-lucide={icon || 'bar-chart-3'} className="w-40 h-40"></i>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
